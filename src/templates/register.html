<!DOCTYPE html>
<html lang="de">
<head><title>Nutzer erstellen</title></head>
<body>
    <h2>Neuen Nutzer registrieren</h2>
    <input type="text" id="name" placeholder="Name"><br>
    <input type="email" id="email" placeholder="Email"><br>
    <input type="password" id="pass" placeholder="Passwort"><br>
    <button onclick="createUser()">Nutzer anlegen</button>

    <script>
        async function createUser() {
            const apiKey = localStorage.getItem('api_key');
            const res = await fetch('/api/auth/users', {
                method: 'POST',
                headers: {
                    'X-API-Key': apiKey,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('pass').value
                })
            });
            const data = await res.json();
            alert(res.ok ? "User erstellt! API-Key: " + data.user.api_key : data.error);
        }
    </script>
</body>
</html>
